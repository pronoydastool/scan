<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>CodeTools - All-in-One Utility</title>
    <link rel="stylesheet" href="/src/index.css" />
  </head>
  <body class="bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 transition-colors duration-300">
    <!-- App Shell -->
    <div id="app" class="flex flex-col h-screen overflow-hidden">
      
      <!-- Top Header -->
      <header class="bg-white dark:bg-slate-800 shadow-sm px-4 py-3 flex items-center justify-between z-10">
        <div class="flex items-center gap-2">
          <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-bold">CT</div>
          <h1 id="page-title" class="text-lg font-bold tracking-tight">CodeTools</h1>
        </div>
        <button id="theme-toggle" class="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors">
          <i data-lucide="moon" class="w-5 h-5 dark:hidden"></i>
          <i data-lucide="sun" class="w-5 h-5 hidden dark:block"></i>
        </button>
      </header>

      <!-- Main Content Area -->
      <main id="main-content" class="flex-1 overflow-y-auto pb-20">
        <!-- Content will be injected here -->
      </main>

      <!-- Bottom Navigation -->
      <nav class="fixed bottom-0 left-0 right-0 bg-white dark:bg-slate-800 border-t border-slate-200 dark:border-slate-700 flex justify-around items-center py-2 px-4 z-20 shadow-[0_-2px_10px_rgba(0,0,0,0.05)]">
        <button data-nav="home" class="nav-item flex flex-col items-center gap-1 text-indigo-600">
          <i data-lucide="home" class="w-6 h-6"></i>
          <span class="text-[10px] font-medium uppercase tracking-wider">Home</span>
        </button>
        <button data-nav="tools" class="nav-item flex flex-col items-center gap-1 text-slate-400">
          <i data-lucide="grid" class="w-6 h-6"></i>
          <span class="text-[10px] font-medium uppercase tracking-wider">Tools</span>
        </button>
        <button data-nav="history" class="nav-item flex flex-col items-center gap-1 text-slate-400">
          <i data-lucide="history" class="w-6 h-6"></i>
          <span class="text-[10px] font-medium uppercase tracking-wider">History</span>
        </button>
        <button data-nav="settings" class="nav-item flex flex-col items-center gap-1 text-slate-400">
          <i data-lucide="settings" class="w-6 h-6"></i>
          <span class="text-[10px] font-medium uppercase tracking-wider">Settings</span>
        </button>
      </nav>
    </div>

    <!-- Tool Screen Overlay (for individual tools) -->
    <div id="tool-overlay" class="fixed inset-0 bg-white dark:bg-slate-900 z-30 translate-x-full transition-transform duration-300 ease-in-out overflow-y-auto">
      <header class="sticky top-0 bg-white dark:bg-slate-800 px-4 py-3 flex items-center gap-4 shadow-sm z-40">
        <button id="close-tool" class="p-1 -ml-1 rounded-full hover:bg-slate-100 dark:hover:bg-slate-700">
          <i data-lucide="arrow-left" class="w-6 h-6"></i>
        </button>
        <h2 id="tool-title" class="text-lg font-bold">Tool Name</h2>
      </header>
      <div id="tool-content" class="p-4 pb-10">
        <!-- Tool UI will be injected here -->
      </div>
    </div>

    <script type="module" src="/src/app.js"></script>
  </body>
</html>
